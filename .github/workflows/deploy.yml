name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Prepare Build Artifact
        run: |
          mkdir _site
          cp index.html _site/
          cp CNAME _site/
          cp robots.txt _site/
          cp sitemap.xml _site/
          cp -r assets _site/
          cp -r dist _site/
          cp -r features _site/
          cp -r why-us _site/
          cp -r faq _site/
          cp -r accessibility _site/
          cp -r privacy-policy _site/
          cp -r terms _site/
          cp -r pricing-policy _site/

          # Copy blog — exclude internal files that must never be public
          rsync -a \
            --exclude='_drafts/' \
            --exclude='BLOG_POST_SYSTEM_PROMPT.md' \
            --exclude='*.md' \
            blog/ _site/blog/

          msg="Build complete. Contents of _site/blog (internal files excluded):"
          echo "$msg"
          find _site/blog -name "*.md" && echo "WARNING: .md files found in build" || echo "OK: no .md files in build"
          find _site/blog -name "_drafts" && echo "WARNING: _drafts found in build" || echo "OK: no _drafts in build"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
